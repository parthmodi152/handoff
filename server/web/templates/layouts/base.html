{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handoff</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full" x-data="{ sidebarOpen: false }">

    <!-- Mobile sidebar overlay -->
    <div x-show="sidebarOpen" x-transition:enter="transition-opacity ease-linear duration-300"
         x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-300"
         x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-40 bg-gray-600 bg-opacity-75 lg:hidden"
         @click="sidebarOpen = false">
    </div>

    <!-- Sidebar (always fixed) -->
    <div :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
         class="fixed inset-y-0 left-0 z-50 w-64 bg-indigo-800 transition-transform duration-300 ease-in-out lg:translate-x-0">
        <div class="flex h-16 items-center justify-between px-6">
            <span class="text-xl font-bold text-white">Handoff</span>
            <button @click="sidebarOpen = false" class="text-indigo-300 hover:text-white lg:hidden">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <nav class="mt-4 px-3 space-y-1">
            <a href="/dashboard"
               class="flex items-center px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "dashboard"}}bg-indigo-900 text-white{{else}}text-indigo-200 hover:bg-indigo-700 hover:text-white{{end}}">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/>
                </svg>
                Dashboard
            </a>
            <a href="/loops"
               class="flex items-center px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "loops"}}bg-indigo-900 text-white{{else}}text-indigo-200 hover:bg-indigo-700 hover:text-white{{end}}">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                </svg>
                Loops
            </a>
            <a href="/requests"
               class="flex items-center px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "requests"}}bg-indigo-900 text-white{{else}}text-indigo-200 hover:bg-indigo-700 hover:text-white{{end}}">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
                Requests
            </a>
            <a href="/api-keys"
               class="flex items-center px-3 py-2 rounded-md text-sm font-medium {{if eq .ActiveNav "api_keys"}}bg-indigo-900 text-white{{else}}text-indigo-200 hover:bg-indigo-700 hover:text-white{{end}}">
                <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
                API Keys
            </a>
        </nav>
    </div>

    <!-- Main content (offset by sidebar width on desktop) -->
    <div class="lg:pl-64 min-h-full">
        <!-- Top bar -->
        <div class="sticky top-0 z-10 flex h-16 shrink-0 items-center border-b border-gray-200 bg-white px-4 shadow-sm sm:px-6">
            <button @click="sidebarOpen = true" class="text-gray-500 hover:text-gray-900 lg:hidden">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
            <div class="flex flex-1 items-center justify-end gap-x-4">
                <span class="text-sm text-gray-700">{{.User.Name}}</span>
                <form method="POST" action="/auth/logout">
                    <button type="submit" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
                </form>
            </div>
        </div>

        <!-- Flash messages -->
        {{if .Flash}}
        <div id="flash-message" class="mx-4 mt-4 sm:mx-6">
            <div class="rounded-md bg-green-50 p-4">
                <div class="flex">
                    <div class="flex-shrink-0">
                        <svg class="h-5 w-5 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-green-800">{{.Flash}}</p>
                    </div>
                </div>
            </div>
        </div>
        {{end}}

        <!-- Page content -->
        <main class="p-4 sm:p-6">
            {{template "content" .}}
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
