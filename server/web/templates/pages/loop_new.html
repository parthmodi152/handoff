{{define "content"}}
<div class="mx-auto max-w-2xl space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Create Loop</h1>
        <p class="mt-1 text-sm text-gray-500">Create a new loop to organize your human-in-the-loop requests.</p>
    </div>

    <form method="POST" action="/loops/new" class="rounded-lg bg-white p-6 shadow-sm ring-1 ring-gray-900/5 space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" name="name" id="name" required
                   class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                   placeholder="My Review Loop">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" id="description" rows="3"
                      class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"
                      placeholder="What is this loop for?"></textarea>
        </div>

        <div>
            <label for="icon" class="block text-sm font-medium text-gray-700">Icon</label>
            <input type="text" name="icon" id="icon" value="&#x1F4CB;"
                   class="mt-1 block w-20 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-center text-xl">
            <p class="mt-1 text-xs text-gray-500">Paste an emoji to use as the loop icon.</p>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-200">
            <a href="/loops" class="text-sm font-medium text-gray-700 hover:text-gray-900">Cancel</a>
            <button type="submit" class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">Create Loop</button>
        </div>
    </form>
</div>
{{end}}
